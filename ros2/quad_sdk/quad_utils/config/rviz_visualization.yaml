/**:
  ros__parameters:
    topics:
      global_plan: global_plan
      global_plan_discrete: global_plan_discrete
      global_plan_tree: global_plan_tree
      start_state: start_state
      goal_state: goal_state
      foot_plan_continuous: foot_plan_continuous
      foot_plan_discrete: foot_plan_discrete
      local_plan: local_plan
      body_force:
        joint_torques: body_force/joint_torques
        toe_forces: body_force/toe_forces
      trajectory: robot_plan
      state: # These should not change for the remapping to work in some launch files
        joints: state/joints
        imu: state/imu
        ground_truth: state/ground_truth
        ground_truth_body_frame: state/ground_truth_body_frame
        estimate: state/estimate
        trajectory: state/trajectory
        grfs: state/grfs
      control:
        grfs: control/grfs
        trajectory: control/trajectory
        joint_command: control/joint_command
        mode: control/mode
        restart_flag: control/restart_flag
        leg_override: control/leg_override
        single_joint_command: control/single_joint_command
      cmd_vel: cmd_vel
      heartbeat:
        robot: heartbeat/robot
      visualization:
        global_plan: visualization/global_plan
        local_plan: visualization/local_plan
        local_plan_ori: visualization/local_plan_ori
        global_plan_grf: visualization/global_plan_grf
        local_plan_grf: visualization/local_plan_grf
        current_grf: visualization/current_grf
        global_plan_discrete: visualization/global_plan_discrete
        foot_plan_discrete: visualization/foot_plan_discrete
        joint_states:
          estimate: estimate/visualization/joint_states
          ground_truth: ground_truth/visualization/joint_states
          trajectory: trajectory/visualization/joint_states
        state:
          estimate_trace: visualization/state/estimate_trace
          ground_truth_trace: visualization/state/ground_truth_trace
          trajectory_trace: visualization/state/trajectory_trace
        foot_0_plan_continuous: visualization/foot_0_plan_continuous
        foot_1_plan_continuous: visualization/foot_1_plan_continuous
        foot_2_plan_continuous: visualization/foot_2_plan_continuous
        foot_3_plan_continuous: visualization/foot_3_plan_continuous
      mocap: mocap_node/quad/pose
    rviz_interface:
      update_rate: 100.0
      orientation_subsample_num: 3
      colors: # Specify as RGB triplets [0,255]
        front_left: [166, 25, 46] # Red, a6192e
        back_left: [0, 45, 114] # Blue, 002e72
        front_right: [0, 132, 61] # Green, 00843d
        back_right: [242, 169, 0] # Yellow, f2a900
        net_grf: [55, 51, 58] # Black
        individual_grf: [45, 31, 38] # Black
    local_footstep_planner:
      period: 0.36
    local_planner:
      timestep: 0.03
    map_frame: map
