        hip_clearance: 0.1
        foothold_search_radius: 0.25
        period: 0.36 # s
        ground_clearance: 0.07 # tune
        duty_cycles: [0.5, 0.5, 0.5, 0.5]
        phase_offsets: [0.0, 0.5, 0.5, 0.0] 
    nmpc_controller:
      body:
        x_dim: 12.0
        u_dim: 12.0
        g_dim: 28.0
        x_weights: [5.0, 5.0, 5.0, 0.5, 0.5, 0.5, 0.1, 0.1, 0.2, 0.05, 0.05, 0.01]
        u_weights: [!!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5, !!float 5e-5]
        # Yaw bound (6th element) widened from ±π to ±10 rad to match
        # PR #400 (Feature/fix yaw wrapping). The local_planner's NMPC
        # reference yaw is unwrapped (math_utils::unwrapVector) so it
        # passes through ±π smoothly when the robot turns more than 180°
        # in a single plan; if the bound here is still ±π, NMPC clips
        # the unwrapped reference and the controller can't track turns.
        # Roll/pitch stay tight; this only widens yaw.
        x_lb: [!!float -2e19, !!float -2e19, 0.0, -3.14159, -3.14159, -10.0, !!float -2e19, !!float -2e19, !!float -2e19, !!float -2e19, !!float -2e19, !!float -2e19]
